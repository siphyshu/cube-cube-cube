    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background-color: #12141c;
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
            /* Prevent text selection while interacting with timer */
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        
        /* Custom Scrollbar for production polish */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

        /* Hide scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Cube Map specific grid classes */
        .cube-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 8px; 
            width: 100%; 
            height: auto; 
            max-width: 260px; /* Constrained to prevent scrolling */
            margin: 0 auto;
        }
        .cube-face { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 4px; 
        }
        .cube-sticker { 
            border-radius: 4px; 
            width: 100%; 
            height: 100%; 
            aspect-ratio: 1; 
            box-shadow: inset 0 0 1px rgba(0, 0, 0, 0.2);
        }
        
        /* Hardware-accelerated hover states */
        .glow-blue { transition: box-shadow 0.2s ease, background-color 0.2s ease; }
        .glow-blue:hover, .glow-blue.active { box-shadow: 0 0 15px rgba(36, 107, 253, 0.6); }
        .glow-green { transition: box-shadow 0.2s ease, background-color 0.2s ease; }
        .glow-green:hover { box-shadow: 0 0 15px rgba(34, 197, 94, 0.6); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // --- Utils & Generators ---
        const MOVES = ["U", "D", "L", "R", "F", "B"];
        const MODIFIERS = ["", "'", "2"];

        function generateScramble(length = 20) {
            let scramble = [];
            let lastMove = "";
            let secondLastMove = "";

            for (let i = 0; i < length; i++) {
                let move;
                do {
                    move = MOVES[Math.floor(Math.random() * MOVES.length)];
                } while (
                    move === lastMove || 
                    (move === secondLastMove && isOpposite(move, lastMove))
                );

                let modifier = MODIFIERS[Math.floor(Math.random() * MODIFIERS.length)];
                scramble.push(move + modifier);
                
                secondLastMove = lastMove;
                lastMove = move;
            }
            return scramble.join(" ");
        }

        function isOpposite(move1, move2) {
            const opposites = { U: "D", D: "U", L: "R", R: "L", F: "B", B: "F" };
            return opposites[move1] === move2;
        }

        // --- Cube Simulator logic to parse notations to visual maps ---
        function getScrambledState(scrambleStr) {
            if (!scrambleStr) return null;
            
            const state = {
                U: Array(9).fill('#ffffff'), // White
                L: Array(9).fill('#ff9826'), // Orange
                F: Array(9).fill('#43ff43'), // Green
                R: Array(9).fill('#ff4343'), // Red
                B: Array(9).fill('#246bfd'), // Blue
                D: Array(9).fill('#ffff49')  // Yellow
            };
            
            // Helper to cycle 4 elements
            const cycle = (f1, i1, f2, i2, f3, i3, f4, i4) => {
                let temp = state[f4][i4];
                state[f4][i4] = state[f3][i3];
                state[f3][i3] = state[f2][i2];
                state[f2][i2] = state[f1][i1];
                state[f1][i1] = temp;
            };

            const rotateFaceCW = (f) => {
                const face = state[f];
                const temp = [...face];
                face[0] = temp[6]; face[1] = temp[3]; face[2] = temp[0];
                face[3] = temp[7]; face[4] = temp[4]; face[5] = temp[1];
                face[6] = temp[8]; face[7] = temp[5]; face[8] = temp[2];
            };

            const applyMoveCW = (move) => {
                rotateFaceCW(move);
                if (move === 'U') {
                    cycle('B', 2, 'R', 2, 'F', 2, 'L', 2);
                    cycle('B', 1, 'R', 1, 'F', 1, 'L', 1);
                    cycle('B', 0, 'R', 0, 'F', 0, 'L', 0);
                } else if (move === 'D') {
                    cycle('F', 6, 'R', 6, 'B', 6, 'L', 6);
                    cycle('F', 7, 'R', 7, 'B', 7, 'L', 7);
                    cycle('F', 8, 'R', 8, 'B', 8, 'L', 8);
                } else if (move === 'F') {
                    cycle('U', 6, 'R', 0, 'D', 2, 'L', 8);
                    cycle('U', 7, 'R', 3, 'D', 1, 'L', 5);
                    cycle('U', 8, 'R', 6, 'D', 0, 'L', 2);
                } else if (move === 'B') {
                    cycle('U', 2, 'L', 0, 'D', 6, 'R', 8);
                    cycle('U', 1, 'L', 3, 'D', 7, 'R', 5);
                    cycle('U', 0, 'L', 6, 'D', 8, 'R', 2);
                } else if (move === 'L') {
                    cycle('U', 0, 'F', 0, 'D', 0, 'B', 8);
                    cycle('U', 3, 'F', 3, 'D', 3, 'B', 5);
                    cycle('U', 6, 'F', 6, 'D', 6, 'B', 2);
                } else if (move === 'R') {
                    cycle('U', 8, 'B', 0, 'D', 8, 'F', 8);
                    cycle('U', 5, 'B', 3, 'D', 5, 'F', 5);
                    cycle('U', 2, 'B', 6, 'D', 2, 'F', 2);
                }
            };

            const moves = scrambleStr.split(' ');
            for (let m of moves) {
                if (!m) continue;
                const face = m[0];
                if (!state[face]) continue; // Validate face to prevent crash
                
                const mod = m[1];
                let times = 1;
                if (mod === "'") times = 3;
                else if (mod === '2') times = 2;

                for (let i = 0; i < times; i++) {
                    applyMoveCW(face);
                }
            }
            return state;
        }


        // --- Formatting & Stats Math ---
        function formatTime(ms, penalty = '') {
            if (penalty === 'DNF') return 'DNF';
            let actualMs = ms;
            if (penalty === '+2') actualMs += 2000;
            if (actualMs < 0) return "0.00";
            
            const totalSeconds = Math.floor(actualMs / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const remainingSeconds = totalSeconds % 60;
            const decimals = Math.floor((actualMs % 1000) / 10);
            
            let timeStr = "";
            if (minutes > 0) {
                timeStr = `${minutes}:${remainingSeconds.toString().padStart(2, '0')}.${decimals.toString().padStart(2, '0')}`;
            } else {
                timeStr = `${remainingSeconds}.${decimals.toString().padStart(2, '0')}`;
            }
            
            if (penalty === '+2') timeStr += '+';
            return timeStr;
        }

        function getActualTime(solve) {
            if (solve.penalty === 'DNF') return Infinity;
            if (solve.penalty === '+2') return solve.time + 2000;
            return solve.time;
        }

        function calculateAverage(solves, count) {
            if (solves.length < count) return "-";
            const recent = solves.slice(0, count).map(getActualTime); 
            
            const dnfs = recent.filter(t => t === Infinity).length;
            if (dnfs > 1) return "DNF";

            recent.sort((a, b) => a - b);
            const trimmed = recent.slice(1, -1); 
            
            if (trimmed.includes(Infinity)) return "DNF"; 

            const sum = trimmed.reduce((acc, val) => acc + val, 0);
            return formatTime(sum / trimmed.length);
        }

        // --- SVGs & Icons ---
        const CaretDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M213.66,101.66l-80,80a8,8,0,0,1-11.32,0l-80-80A8,8,0,0,1,53.66,90.34L128,164.69l74.34-74.35a8,8,0,0,1,11.32,11.32Z"></path></svg>;
        const CloseIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const CubeIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M224,177.3V78.7a8.1,8.1,0,0,0-4.1-7l-88-49.5a7.8,7.8,0,0,0-7.8,0l-88,49.5a8.1,8.1,0,0,0-4.1,7v98.6a8.1,8.1,0,0,0,4.1,7l88,49.5a7.8,7.8,0,0,0,7.8,0l88-49.5A8.1,8.1,0,0,0,224,177.3Z" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></path><polyline points="222.9 74.6 128.9 128 33.1 74.6" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></polyline><line x1="128.9" y1="128" x2="128" y2="234.8" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></line></svg>
        );
        const BanIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line></svg>
        );
        
        // Directional Arrows
        const ArrowLeftIcon = ({ className }) => <svg className={className} width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
        const ArrowRightIcon = ({ className }) => <svg className={className} width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>;
        const ArrowUpIcon = ({ className }) => <svg className={className} width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>;
        const ArrowDownIcon = ({ className }) => <svg className={className} width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>;
        const RotateCwIcon = ({ className }) => <svg className={className} width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><polyline points="21 3 21 8 16 8"></polyline></svg>;
        const RotateCcwIcon = ({ className }) => <svg className={className} width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>;
        const NavigationIcon = ({ className }) => <svg className={className} width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>;

        // --- Chart Component ---
        const TimeGraphChart = ({ solves }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (!chartRef.current) return;
                
                const ctx = chartRef.current.getContext('2d');
                const data = solves.map(s => getActualTime(s) / 1000);
                const labels = solves.map((_, i) => `Solve ${i + 1}`);

                if (chartInstance.current) {
                    chartInstance.current.destroy();
                }

                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Time',
                            data: data,
                            borderColor: '#246bfd',
                            backgroundColor: 'rgba(36, 107, 253, 0.15)',
                            borderWidth: 2,
                            pointBackgroundColor: '#ffffff',
                            pointBorderColor: '#246bfd',
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: '#181b25',
                                borderColor: 'rgba(255,255,255,0.1)',
                                borderWidth: 1,
                                titleFont: { family: 'Inter', size: 12, weight: 'normal' },
                                titleColor: 'rgba(255,255,255,0.6)',
                                bodyFont: { family: 'Roboto Mono', size: 14, weight: 'bold' },
                                padding: 10,
                                displayColors: false,
                                callbacks: {
                                    label: function(context) {
                                        return context.parsed.y.toFixed(2) + 's';
                                    }
                                }
                            }
                        },
                        scales: {
                            x: { display: false },
                            y: {
                                grid: { color: 'rgba(255, 255, 255, 0.05)' },
                                ticks: { 
                                    color: 'rgba(255, 255, 255, 0.4)', 
                                    font: { family: 'Roboto Mono', size: 11 },
                                    maxTicksLimit: 6
                                },
                                border: { display: false }
                            }
                        },
                        interaction: { mode: 'index', intersect: false }
                    }
                });

                return () => {
                    if (chartInstance.current) chartInstance.current.destroy();
                };
            }, [solves]);

            return <canvas ref={chartRef} className="w-full h-full" />;
        };


        // --- Components ---
        const Dropdown = ({ label, options, selected, onSelect }) => {
            const [isOpen, setIsOpen] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (ref.current && !ref.current.contains(event.target)) setIsOpen(false);
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const filteredOptions = options.filter(opt => opt !== selected);

            return (
                <div className="relative z-[60]" ref={ref}>
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className={`bg-primary hover:bg-blue-500 text-white text-sm font-semibold px-3 py-1.5 rounded flex items-center gap-1 transition-all glow-blue ${isOpen ? 'active' : ''}`}
                    >
                        {label} <CaretDown />
                    </button>
                    
                    {isOpen && (
                        <div className="absolute top-full left-0 mt-1 w-48 bg-[#181b25] border border-white/10 rounded-lg shadow-xl overflow-y-auto max-h-60 py-1 no-scrollbar z-[70]">
                            {filteredOptions.map(opt => (
                                <button 
                                    key={opt}
                                    onClick={() => { onSelect(opt); setIsOpen(false); }}
                                    className={`w-full text-left px-4 py-2.5 text-sm font-medium hover:bg-white/5 transition-colors ${selected === opt ? 'text-white' : 'text-gray-300'}`}
                                >
                                    {opt}
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const DEFAULT_STATS_CONFIG = [
            { id: 1, type: 'Single', result: 'Best', label: 'pb', count: null, colSpan: 1, rowSpan: 2 },
            { id: 2, type: 'Single', result: 'Worst', label: 'worst', count: null, colSpan: 1, rowSpan: 1 },
            { id: 3, type: 'Average', result: 'Current', label: 'avg', count: null, colSpan: 1, rowSpan: 1 },
            { id: 4, type: 'Average', result: 'Best', label: 'ao5 pb', count: 5, colSpan: 1, rowSpan: 1 },
            { id: 5, type: 'Average', result: 'Current', label: 'ao5', count: 5, colSpan: 1, rowSpan: 1 },
            { id: 6, type: 'Average', result: 'Best', label: 'ao12 pb', count: 12, colSpan: 1, rowSpan: 1 },
            { id: 7, type: 'Average', result: 'Current', label: 'ao12', count: 12, colSpan: 1, rowSpan: 1 },
        ];

        // --- Main App Component ---
        function App() {
            // Persisted States (Safely initialized for production environments)
            const [solves, setSolves] = useState(() => {
                try {
                    const saved = localStorage.getItem('cuboid-solves');
                    return saved ? JSON.parse(saved) : [];
                } catch(e) { return []; }
            });
            const [statsConfig, setStatsConfig] = useState(() => {
                try {
                    const saved = localStorage.getItem('cuboid-stats');
                    return saved ? JSON.parse(saved) : DEFAULT_STATS_CONFIG;
                } catch(e) { return DEFAULT_STATS_CONFIG; }
            });
            const [panels, setPanels] = useState(() => {
                try {
                    const saved = localStorage.getItem('cuboid-panels');
                    return saved ? JSON.parse(saved) : ['Solves', 'Stats', 'Scramble'];
                } catch(e) { return ['Solves', 'Stats', 'Scramble']; }
            });
            const [scrambleMode, setScrambleMode] = useState(() => {
                try {
                    const saved = localStorage.getItem('cuboid-scramble-mode');
                    return saved !== null ? JSON.parse(saved) : true;
                } catch(e) { return true; }
            });
            const [showArrows, setShowArrows] = useState(() => {
                try {
                    const saved = localStorage.getItem('cuboid-show-arrows');
                    return saved !== null ? JSON.parse(saved) : false;
                } catch(e) { return false; }
            });
            const [isLocked, setIsLocked] = useState(() => {
                try {
                    const saved = localStorage.getItem('cuboid-is-locked');
                    return saved !== null ? JSON.parse(saved) : false;
                } catch(e) { return false; }
            });
            const [scramble, setScramble] = useState(() => {
                try {
                    const saved = localStorage.getItem('cuboid-current-scramble');
                    return saved !== null ? saved : ""; 
                } catch(e) { return ""; }
            });

            // Local States
            const [cubeState, setCubeState] = useState(null);
            const [showPbBadge, setShowPbBadge] = useState(false);
            const panelOptions = ['Solves', 'Stats', 'Scramble', 'Time Graph', 'Export CSV', 'Import CSV', 'None'];

            // Timer state: 'idle' | 'ready' (holding space) | 'running'
            const [timerState, setTimerState] = useState('idle');
            
            // Restore visual time of the last solve on initial load
            const [timeMs, setTimeMs] = useState(() => {
                try {
                    const saved = localStorage.getItem('cuboid-solves');
                    const parsed = saved ? JSON.parse(saved) : [];
                    return parsed.length > 0 ? parsed[0].time : 0;
                } catch(e) { return 0; }
            });
            const timerRef = useRef(null);
            const startTimeRef = useRef(0);

            // Modal State
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedBlockId, setSelectedBlockId] = useState(1);

            const handleExportCSV = useCallback(() => {
                if (solves.length === 0) return;
                const csvContent = "data:text/csv;charset=utf-8," + "Time (ms),Penalty,Scramble\n" + solves.map(s => `${s.time},${s.penalty},"${s.scramble}"`).join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `cuboid_solves_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }, [solves]);

            const handleImportCSV = useCallback(() => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.csv';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const text = event.target.result;
                        const lines = text.split('\n').slice(1);
                        const importedSolves = lines.filter(line => line.trim()).map(line => {
                            const parts = line.split(',');
                            const time = parseInt(parts[0]?.trim());
                            const penalty = parts[1]?.trim() || '';
                            const scrambleMatch = line.match(/"([^"]*)"/);
                            const scramble = scrambleMatch ? scrambleMatch[1] : parts[2]?.trim() || '';
                            if (!isNaN(time)) {
                                return { id: Date.now() + Math.random(), time, penalty, scramble };
                            }
                            return null;
                        }).filter(Boolean);
                        if (importedSolves.length > 0) {
                            setSolves(prev => [...importedSolves.reverse(), ...prev]);
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            }, []);

            // Save to LocalStorage effects
            useEffect(() => { localStorage.setItem('cuboid-solves', JSON.stringify(solves)); }, [solves]);
            useEffect(() => { localStorage.setItem('cuboid-stats', JSON.stringify(statsConfig)); }, [statsConfig]);
            useEffect(() => { localStorage.setItem('cuboid-panels', JSON.stringify(panels)); }, [panels]);
            useEffect(() => { localStorage.setItem('cuboid-scramble-mode', JSON.stringify(scrambleMode)); }, [scrambleMode]);
            useEffect(() => { localStorage.setItem('cuboid-show-arrows', JSON.stringify(showArrows)); }, [showArrows]);
            useEffect(() => { localStorage.setItem('cuboid-is-locked', JSON.stringify(isLocked)); }, [isLocked]);
            useEffect(() => { localStorage.setItem('cuboid-current-scramble', scramble); }, [scramble]);

            // Initial Scramble logic decoupled safely
            useEffect(() => {
                if (scrambleMode && scramble === "") {
                    const initScramble = generateScramble();
                    setScramble(initScramble);
                }
            }, []); // run once on mount

            // Sync visual state with scramble variable
            useEffect(() => {
                if (scrambleMode && scramble) {
                    setCubeState(getScrambledState(scramble));
                } else {
                    setCubeState(null);
                }
            }, [scramble, scrambleMode]);

            // Safely toggle without nested state loops
            const toggleScrambleMode = useCallback(() => {
                if (!scrambleMode) {
                    const nextScramble = generateScramble();
                    setScramble(nextScramble);
                    setScrambleMode(true);
                } else {
                    setScramble("");
                    setScrambleMode(false);
                }
            }, [scrambleMode]);

            const updateTime = useCallback(() => {
                setTimeMs(Date.now() - startTimeRef.current);
                timerRef.current = requestAnimationFrame(updateTime);
            }, []);

            const startTimer = useCallback(() => {
                startTimeRef.current = Date.now();
                setTimerState('running');
                timerRef.current = requestAnimationFrame(updateTime);
            }, [updateTime]);

            const stopTimer = useCallback(() => {
                cancelAnimationFrame(timerRef.current);
                setTimerState('idle');
                const finalTime = Date.now() - startTimeRef.current;
                setTimeMs(finalTime);
                
                // Add solve and check for PB
                setSolves(prev => {
                    const validSolves = prev.filter(s => s.penalty !== 'DNF').map(s => s.time);
                    if (validSolves.length === 0 || finalTime < Math.min(...validSolves)) {
                        setShowPbBadge(true);
                    } else {
                        setShowPbBadge(false);
                    }
                    return [{ id: Date.now(), time: finalTime, penalty: '', scramble: scrambleMode ? scramble : 'No Scramble' }, ...prev];
                });
                
                // Advance Scramble safely if applicable
                if (!isLocked && scrambleMode) {
                    const nextScramble = generateScramble();
                    setScramble(nextScramble);
                    setCubeState(getScrambledState(nextScramble));
                }
            }, [scramble, isLocked, scrambleMode]);

            const handleTouchStart = useCallback((e) => {
                if (isModalOpen) return;
                e.preventDefault();
                if (timerState === 'idle') {
                    setTimerState('ready');
                    setTimeMs(0);
                    setShowPbBadge(false);
                } else if (timerState === 'running') {
                    stopTimer();
                }
            }, [timerState, stopTimer, isModalOpen]);

            const handleTouchEnd = useCallback((e) => {
                if (isModalOpen) return;
                e.preventDefault();
                if (timerState === 'ready') {
                    startTimer();
                }
            }, [timerState, startTimer, isModalOpen]);

            useEffect(() => {
                if (isModalOpen) return; // Disable spacebar timer if modal is open

                const handleKeyDown = (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault(); 
                        if (e.repeat) return; // Ignore auto-repeat when key is held down

                        if (timerState === 'idle') {
                            setTimerState('ready');
                            setTimeMs(0); 
                            setShowPbBadge(false); // Hide badge when preparing for new solve
                        } else if (timerState === 'running') {
                            stopTimer();
                        }
                    }
                };

                const handleKeyUp = (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        if (timerState === 'ready') {
                            startTimer();
                        }
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                window.addEventListener('keyup', handleKeyUp);
                return () => {
                    window.removeEventListener('keydown', handleKeyDown);
                    window.removeEventListener('keyup', handleKeyUp);
                };
            }, [timerState, startTimer, stopTimer, isModalOpen]);

            // Controls Handlers
            const handleCopyScramble = () => {
                if (!scramble) return;
                const textarea = document.createElement('textarea');
                textarea.value = scramble;
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                } catch (err) {
                    console.error('Failed to copy', err);
                }
                document.body.removeChild(textarea);
                
                const btn = document.getElementById('copyBtn');
                if (btn) {
                    btn.style.color = '#22c55e';
                    setTimeout(() => btn.style.color = '', 1000);
                }
            };

            const handleNewScramble = () => {
                setScramble(generateScramble());
            };

            // Solve Actions
            const togglePenalty = useCallback((id, type) => {
                setSolves(prev => prev.map(s => {
                    if (s.id !== id) return s;
                    return { ...s, penalty: s.penalty === type ? '' : type };
                }));
            }, []);

            const deleteSolve = useCallback((id) => {
                setSolves(prev => prev.filter(s => s.id !== id));
            }, []);

            // Calculate a single stat based on config
            const calcStatValue = useCallback((config, allSolves) => {
                const validTimes = allSolves.map(getActualTime).filter(t => t !== Infinity);
                
                // If there are solves but all are DNF, return DNF. Otherwise if 0 solves, return '-'
                if (validTimes.length === 0) return allSolves.length > 0 ? "DNF" : "-";
                
                const isSingle = config.type === 'Single';

                if (isSingle) {
                    if (config.result === 'Best') {
                        return formatTime(Math.min(...validTimes));
                    }
                    if (config.result === 'Worst') {
                        return formatTime(Math.max(...validTimes));
                    }
                } else {
                    if (!config.count) {
                        const sum = validTimes.reduce((a, b) => a + b, 0);
                        return formatTime(sum / validTimes.length);
                    }
                    if (config.result === 'Current') {
                        return calculateAverage(allSolves, config.count);
                    }
                    if (config.result === 'Best') {
                        let bestAvg = Infinity;
                        for (let i = 0; i <= allSolves.length - config.count; i++) {
                            const slice = allSolves.slice(i, i + config.count);
                            const avgStr = calculateAverage(slice, config.count);
                            if (avgStr !== "DNF" && avgStr !== "-") {
                                const avgNum = parseFloat(avgStr) * 1000;
                                if (avgNum < bestAvg) bestAvg = avgNum;
                            }
                        }
                        return bestAvg === Infinity ? "-" : formatTime(bestAvg);
                    }
                }
                return "-";
            }, []);

            // Layout map array (based on CSS grid order)
            const getVisualMap = useCallback(() => {
                if(!cubeState) return Array(12).fill(null);
                return [
                    null, cubeState.U, null, null,
                    cubeState.L, cubeState.F, cubeState.R, cubeState.B,
                    null, cubeState.D, null, null
                ];
            }, [cubeState]);

            // Calculate Grid rows needed for Stats panel (2-column layout)
            const totalArea = useMemo(() => statsConfig.reduce((acc, block) => acc + ((block.colSpan || 1) * (block.rowSpan || 1)), 0), [statsConfig]);
            const statsRowsNeeded = Math.max(1, Math.ceil(totalArea / 2));

            const renderPanelContent = (type, index) => {
                switch (type) {
                    case 'Solves':
                        return (
                            <div className="w-full h-full flex flex-col p-3">
                                {solves.length === 0 ? (
                                    <div className="text-center opacity-50 flex flex-col items-center justify-center h-full">
                                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" className="mb-2">
                                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                                            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                                            <line x1="12" y1="22.08" x2="12" y2="12"></line>
                                            <path d="M12 22.08V12L3.27 6.96"></path>
                                        </svg>
                                        <p className="text-sm">No solves yet</p>
                                    </div>
                                ) : (
                                    <div className="overflow-y-auto no-scrollbar flex-1">
                                        {solves.map((s, idx) => {
                                        const timeColor = s.penalty === 'DNF' ? 'text-gray-500 line-through' : 'text-[#22c55e]';
                                        return (
                                            <div key={s.id} className="flex justify-between items-center py-2 text-sm font-mono group/row px-3 hover:bg-white/5 rounded-lg transition-colors">
                                                <div className="flex items-center gap-4 flex-1">
                                                    <span className="text-white/40 font-bold w-6">{solves.length - idx}.</span>
                                                    <span className={`font-bold text-[15px] ${timeColor}`}>
                                                        {formatTime(s.time, s.penalty)}
                                                    </span>
                                                </div>
                                                
                                                <div className="flex items-center gap-3 font-bold text-xs tracking-wider">
                                                    <button 
                                                        onClick={() => togglePenalty(s.id, '+2')}
                                                        className={`transition-colors ${s.penalty === '+2' ? 'text-white' : 'text-gray-500 hover:text-white'}`}
                                                        aria-label="Add +2 penalty"
                                                    >+2</button>
                                                    <button 
                                                        onClick={() => togglePenalty(s.id, 'DNF')}
                                                        className={`transition-colors ${s.penalty === 'DNF' ? 'text-white' : 'text-gray-500 hover:text-white'}`}
                                                        aria-label="Add DNF penalty"
                                                    >DNF</button>
                                                    <button 
                                                        onClick={() => deleteSolve(s.id)} 
                                                        className="text-gray-500 hover:text-white ml-2 flex items-center justify-center"
                                                        aria-label="Delete solve"
                                                    >
                                                        <CloseIcon />
                                                    </button>
                                                </div>
                                            </div>
                                        )
                                    })}
                                    </div>
                                )}
                            </div>
                        );
                    case 'Stats':
                        return (
                            <>
                                <div className="absolute top-3 right-3 opacity-0 group-hover:opacity-100 focus-within:opacity-100 transition-opacity z-30">
                                    <button 
                                        onClick={() => setIsModalOpen(true)}
                                        className="bg-success text-black text-xs font-bold px-3 py-1.5 rounded glow-green transition-all shadow-lg"
                                        aria-label="Customize Statistics"
                                    >
                                        Customize Stats
                                    </button>
                                </div>
                                <div className="grid gap-2 h-full w-full p-3" style={{
                                    gridTemplateColumns: 'repeat(2, minmax(0, 1fr))',
                                    gridTemplateRows: `repeat(${statsRowsNeeded}, minmax(0, 1fr))`
                                }}>
                                    {statsConfig.map(block => (
                                        <div 
                                            key={block.id} 
                                            className="bg-white/[0.04] rounded-lg p-3 flex flex-col justify-between overflow-hidden"
                                            style={{ gridColumn: `span ${block.colSpan || 1}`, gridRow: `span ${block.rowSpan || 1}` }}
                                        >
                                            <span className="text-[13px] font-bold text-gray-400 leading-none mb-1">{block.label}</span>
                                            <div className={`w-full flex-1 flex items-center justify-center font-bold text-white leading-none ${block.rowSpan > 1 ? 'text-[48px]' : 'text-[26px]'}`}>
                                                {calcStatValue(block, solves)}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </>
                        );
                    case 'Scramble':
                        return (
                            <div className="w-full h-full flex items-center justify-center p-3">
                                {cubeState ? (
                                    <div className="cube-grid aspect-[4/3]">
                                        {getVisualMap().map((face, i) => (
                                            <div key={i} className={face ? "cube-face" : ""}>
                                                {face && face.map((color, j) => (
                                                    <div key={j} className="cube-sticker" style={{ backgroundColor: color }}></div>
                                                ))}
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="opacity-30 text-sm">Scramble Disabled</div>
                                )}
                            </div>
                        );
                    case 'Time Graph':
                        {
                            const validGraphSolves = [...solves].reverse().filter(s => getActualTime(s) !== Infinity);
                            
                            if (validGraphSolves.length < 2) {
                                return <div className="w-full h-full flex items-center justify-center opacity-50 text-sm">Need at least 2 valid solves</div>;
                            }

                            return (
                                <div className="w-full h-full p-4 flex flex-col">
                                    <div className="flex-1 w-full h-full relative">
                                        <TimeGraphChart solves={validGraphSolves} />
                                    </div>
                                </div>
                            );
                        }
                    case 'None':
                        return <div className="w-full h-full flex items-center justify-center opacity-30 text-sm">Empty Panel</div>;
                    default:
                        return null;
                }
            };

            const timerColor = timerState === 'ready' ? 'text-green-500' : 'text-textMain';

            return (
                <div className="flex flex-col min-h-screen font-sans bg-bg overflow-x-hidden relative">
                    
                    {/* Header */}
                    <header className="flex flex-wrap items-center justify-between p-4 gap-2 relative z-10">
                        <div className="flex gap-2 text-white font-bold text-lg items-center opacity-80">
                            <CubeIcon /> <span>3x3</span>
                        </div>
                    </header>

                    {/* Main Timer */}
                    <main className="flex-1 flex flex-col items-center justify-center py-4 px-4 min-h-[35vh]">
                        <div className="text-center w-full max-w-4xl px-2">
                            <div className="h-8 mb-2 flex justify-center items-center">
                                {showPbBadge && (
                                    <span className="bg-[#00ba55] text-white text-sm font-semibold px-4 py-1.5 rounded shadow-[0_0_20px_rgba(0,186,85,0.4)]">
                                        New 3x3 Single PB!
                                    </span>
                                )}
                            </div>
                            
                            <div className="font-mono text-base md:text-[21px] leading-[1.6] tracking-wide text-white mb-4 sm:mb-6 min-h-[80px] flex items-end justify-center font-medium">
                                {scrambleMode ? (
                                    showArrows && scramble ? (
                                        <div className="flex flex-wrap justify-center items-end gap-y-2">
                                            {scramble.split(' ').map((move, i) => {
                                                if (!move) return null;
                                                const base = move[0];
                                                const mod = move[1] || '';
                                                const isPrime = mod === "'";
                                                const isDouble = mod === "2";

                                                let Arrow = null;
                                                if (base === 'U') Arrow = isPrime ? ArrowRightIcon : ArrowLeftIcon;
                                                if (base === 'D') Arrow = isPrime ? ArrowLeftIcon : ArrowRightIcon;
                                                if (base === 'R') Arrow = isPrime ? ArrowDownIcon : ArrowUpIcon;
                                                if (base === 'L') Arrow = isPrime ? ArrowUpIcon : ArrowDownIcon;
                                                if (base === 'F') Arrow = isPrime ? RotateCcwIcon : RotateCwIcon;
                                                if (base === 'B') Arrow = isPrime ? RotateCwIcon : RotateCcwIcon;

                                                if (isDouble) {
                                                    if (base === 'U') Arrow = ArrowLeftIcon;
                                                    if (base === 'D') Arrow = ArrowRightIcon;
                                                    if (base === 'R') Arrow = ArrowUpIcon;
                                                    if (base === 'L') Arrow = ArrowDownIcon;
                                                    if (base === 'F') Arrow = RotateCwIcon;
                                                    if (base === 'B') Arrow = RotateCcwIcon;
                                                }

                                                return (
                                                    <div key={i} className="flex flex-col items-center mx-1 gap-1">
                                                        <span>{move}</span>
                                                        <div className="flex text-primary opacity-90 text-[18px]">
                                                            {Arrow && <Arrow />}
                                                            {isDouble && Arrow && <Arrow className="-ml-2" />}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    ) : (
                                        <span>{scramble}</span>
                                    )
                                ) : null}
                            </div>
                            
                            <div className={`flex gap-4 sm:gap-6 justify-center text-gray-500 mb-4 sm:mb-8 flex-wrap transition-colors`}>
                                <button 
                                    onClick={toggleScrambleMode} 
                                    className={`transition-colors ${!scrambleMode ? 'text-red-500' : 'hover:text-white'}`} 
                                    title={scrambleMode ? "Turn Off Scramble" : "Turn On Scramble"}
                                    aria-label="Toggle Scramble Mode"
                                >
                                    <BanIcon />
                                </button>
                                
                                {scrambleMode && (
                                    <>
                                        <button 
                                            onClick={() => setShowArrows(!showArrows)} 
                                            className={`transition-colors ${showArrows ? 'text-primary' : 'hover:text-white'}`}
                                            title="Toggle Move Arrows"
                                            aria-label="Toggle Move Arrows"
                                        >
                                            <NavigationIcon className="w-[18px] h-[18px]" />
                                        </button>
                                        <button onClick={() => setIsLocked(!isLocked)} className={`transition-colors ${isLocked ? 'text-primary' : 'hover:text-white'}`} title="Lock Scramble" aria-label="Lock Scramble">
                                            {isLocked ? (
                                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 256 256"><rect width="256" height="256" fill="none"></rect><rect x="40" y="88" width="176" height="128" rx="8" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></rect><path d="M92,88V52a36,36,0,0,1,72,0V88" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></path><circle cx="128" cy="152" r="16"></circle></svg>
                                            ) : (
                                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 256 256"><rect x="40" y="88" width="176" height="128" rx="8" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></rect><path d="M92,88v-40a36,36,0,0,1,72,0v16" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></path><circle cx="128" cy="152" r="16"></circle></svg>
                                            )}
                                        </button>
                                        <button id="copyBtn" onClick={handleCopyScramble} className="hover:text-white transition-colors" title="Copy Scramble" aria-label="Copy Scramble">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 256 256"><polyline points="168 168 216 168 216 40 88 40 88 88" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></polyline><rect x="40" y="88" width="128" height="128" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></rect></svg>
                                        </button>
                                        <button onClick={handleNewScramble} className="hover:text-white transition-colors" title="New Scramble" aria-label="Generate New Scramble">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 256 256"><polyline points="176.2 99.7 224.2 99.7 224.2 51.7" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></polyline><path d="M190.2,190.2a88,88,0,1,1,0-124.4l34,33.9" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></path></svg>
                                        </button>
                                    </>
                                )}
                            </div>
                        </div>

                        <div 
                            className={`font-mono text-[80px] sm:text-[110px] md:text-[130px] lg:text-[160px] leading-none font-medium mb-8 sm:mb-12 transition-colors duration-100 ${timerColor} tabular-nums tracking-tight cursor-pointer select-none`}
                            onTouchStart={handleTouchStart}
                            onTouchEnd={handleTouchEnd}
                        >
                            {timerState === 'idle' && solves.length > 0 && timeMs === solves[0].time ? formatTime(solves[0].time, solves[0].penalty) : formatTime(timeMs)}
                        </div>
                    </main>

                    {/* Bottom Panels Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 lg:gap-6 p-4 lg:p-6 bg-transparent w-full max-w-[1400px] mx-auto mt-auto">
                        {panels.map((panelType, index) => (
                            <div key={index} className={`bg-module rounded-xl relative group h-[280px] flex flex-col w-full shadow-lg transition-all ${panelType === 'Stats' ? 'border-2 border-[#2a323d]' : 'border border-transparent'}`}>
                                <div className="absolute top-3 left-3 z-40 opacity-0 group-hover:opacity-100 focus-within:opacity-100 transition-opacity duration-200">
                                    <Dropdown 
                                        label={panelType} 
                                        options={panelOptions} 
                                        selected={panelType}
                                        onSelect={(newVal) => {
                                            if (newVal === 'Export CSV') {
                                                handleExportCSV();
                                            } else if (newVal === 'Import CSV') {
                                                handleImportCSV();
                                            } else {
                                                const newPanels = [...panels];
                                                newPanels[index] = newVal;
                                                setPanels(newPanels);
                                            }
                                        }} 
                                    />
                                </div>
                                <div className="flex-1 relative overflow-hidden">
                                    {renderPanelContent(panelType, index)}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Customize Stats Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
                            <div className="bg-[#12141c] w-full max-w-3xl rounded-xl border border-white/10 shadow-2xl flex flex-col max-h-[90vh]">
                                {/* Modal Header */}
                                <div className="flex justify-between items-center p-6 border-b border-white/5">
                                    <div>
                                        <h2 className="text-2xl font-bold text-white mb-1">Customize Stats</h2>
                                        <p className="text-sm text-gray-400">Customize this here and now</p>
                                    </div>
                                    <button onClick={() => setIsModalOpen(false)} className="text-gray-400 hover:text-white p-2">
                                        <CloseIcon />
                                    </button>
                                </div>

                                {/* Modal Body */}
                                <div className="p-6 overflow-y-auto">
                                    
                                    {/* Mock Grid (Scaled similarly to main grid) */}
                                    <div className="grid gap-2 h-64 w-full mb-6" style={{
                                        gridTemplateColumns: 'repeat(2, minmax(0, 1fr))',
                                        gridTemplateRows: `repeat(${statsRowsNeeded}, minmax(0, 1fr))`
                                    }}>
                                        {statsConfig.map(block => (
                                            <div 
                                                key={block.id} 
                                                onClick={() => setSelectedBlockId(block.id)}
                                                className={`bg-white/[0.04] rounded-lg p-2.5 flex flex-col cursor-pointer overflow-hidden transition-all border-2 ${selectedBlockId === block.id ? 'border-primary shadow-[0_0_15px_rgba(36,107,253,0.3)]' : 'border-transparent hover:bg-white/10'}`}
                                                style={{ gridColumn: `span ${block.colSpan || 1}`, gridRow: `span ${block.rowSpan || 1}` }}
                                            >
                                                <span className="text-xs font-bold text-gray-400 leading-none mb-1">{block.label}</span>
                                                <div className={`w-full flex-1 flex items-center justify-center font-bold text-white leading-none ${block.rowSpan > 1 ? 'text-[48px]' : 'text-[26px]'}`}>
                                                    {calcStatValue(block, solves)}
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="flex justify-center gap-4 mb-8 border-b border-white/5 pb-8">
                                        <button 
                                            onClick={() => {
                                                const newId = Math.max(0, ...statsConfig.map(b => b.id)) + 1;
                                                const newBlock = { id: newId, type: 'Average', result: 'Current', label: 'ao5', count: 5, colSpan: 1, rowSpan: 1 };
                                                setStatsConfig([...statsConfig, newBlock]);
                                                setSelectedBlockId(newId);
                                            }}
                                            className="bg-primary hover:bg-blue-500 text-white text-sm font-semibold px-4 py-2 rounded-md glow-blue transition-all"
                                        >
                                            Add block
                                        </button>
                                        <button 
                                            onClick={() => {
                                                if (statsConfig.length <= 1) return;
                                                const newConfig = statsConfig.filter(b => b.id !== selectedBlockId);
                                                setStatsConfig(newConfig);
                                                setSelectedBlockId(newConfig[0].id);
                                            }}
                                            className="bg-red-500/10 hover:bg-red-500/20 text-red-400 text-sm font-semibold px-4 py-2 rounded-md transition-all"
                                        >
                                            Remove selected
                                        </button>
                                    </div>

                                    {/* Edit Options for Selected Block */}
                                    {statsConfig.find(b => b.id === selectedBlockId) && (() => {
                                        const selectedBlock = statsConfig.find(b => b.id === selectedBlockId);
                                        
                                        const updateBlock = (updates) => {
                                            setStatsConfig(prev => prev.map(b => {
                                                if (b.id !== selectedBlockId) return b;
                                                const updated = { ...b, ...updates };
                                                // auto update label
                                                if(updated.type === 'Single') {
                                                    updated.label = updated.result === 'Best' ? 'pb' : 'worst';
                                                } else {
                                                    updated.label = `ao${updated.count || '?'}` + (updated.result === 'Best' ? ' pb' : '');
                                                }
                                                return updated;
                                            }));
                                        };

                                        return (
                                            <div className="space-y-6 max-w-md mx-auto">
                                                <h3 className="text-lg font-bold text-center mb-2">
                                                    {selectedBlock.result} Solve
                                                </h3>

                                                <div>
                                                    <label className="text-sm font-semibold text-white/80 block mb-2">Stat type</label>
                                                    <div className="flex gap-2">
                                                        {['Single', 'Average'].map(type => (
                                                            <button 
                                                                key={type}
                                                                onClick={() => updateBlock({ type, count: type==='Average'?5:null })}
                                                                className={`px-4 py-2 rounded-md text-sm font-semibold transition-all ${selectedBlock.type === type ? 'bg-primary text-white glow-blue' : 'bg-white/5 text-gray-300 hover:bg-white/10'}`}
                                                            >
                                                                {type}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div>
                                                    <label className="text-sm font-semibold text-white/80 block mb-2">Stat result</label>
                                                    <div className="flex gap-2">
                                                        {['Best', 'Worst', 'Current'].map(result => {
                                                            if (selectedBlock.type === 'Single' && result === 'Current') return null;
                                                            if (selectedBlock.type === 'Average' && result === 'Worst') return null; 
                                                            
                                                            return (
                                                                <button 
                                                                    key={result}
                                                                    onClick={() => updateBlock({ result })}
                                                                    className={`px-4 py-2 rounded-md text-sm font-semibold transition-all ${selectedBlock.result === result ? 'bg-primary text-white glow-blue' : 'bg-white/5 text-gray-300 hover:bg-white/10'}`}
                                                                >
                                                                    {result}
                                                                </button>
                                                            )
                                                        })}
                                                    </div>
                                                </div>
                                                
                                                {selectedBlock.type === 'Average' && (
                                                    <div>
                                                        <label className="text-sm font-semibold text-white/80 block mb-2">Count</label>
                                                        <div className="flex gap-2">
                                                            {[5, 12, 50, 100].map(count => (
                                                                <button 
                                                                    key={count}
                                                                    onClick={() => updateBlock({ count })}
                                                                    className={`px-4 py-2 rounded-md text-sm font-semibold transition-all ${selectedBlock.count === count ? 'bg-primary text-white glow-blue' : 'bg-white/5 text-gray-300 hover:bg-white/10'}`}
                                                                >
                                                                    {count}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })()}

                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

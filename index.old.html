<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Cuboid - A fast, modern, and simple speedcubing timer.">
    <title>Cuboid</title>
    <link rel="icon" href="./cube.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#12141c',
                        module: '#181b25', 
                        moduleDark: '#0c0d17',
                        btn: '#1e242c',
                        btnHover: '#2a323d',
                        primary: '#246bfd',
                        success: '#22c55e',
                        textMain: '#ffffff',
                    },
                    fontFamily: {
                        mono: ['"Roboto Mono"', 'monospace'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }

    </script>
    <style>
        body {
            background-color: #12141c;
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .cube-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 8px; 
            width: 100%; 
            height: auto; 
            max-width: 260px;
            margin: 0 auto;
        }
        .cube-face { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 4px; 
        }
        .cube-sticker { 
            border-radius: 4px; 
            width: 100%; 
            height: 100%; 
            aspect-ratio: 1; 
            box-shadow: inset 0 0 1px rgba(0, 0, 0, 0.2);
        }
        .glow-blue { transition: box-shadow 0.2s ease, background-color 0.2s ease; }
        .glow-blue:hover, .glow-blue.active { box-shadow: 0 0 15px rgba(36, 107, 253, 0.6); }
        .glow-green { transition: box-shadow 0.2s ease, background-color 0.2s ease; }
        .glow-green:hover { box-shadow: 0 0 15px rgba(34, 197, 94, 0.6); }
        @keyframes pbFlash {
            0%   { opacity: 0; transform: scale(0.85) translateY(-6px); }
            12%  { opacity: 1; transform: scale(1.06) translateY(0); }
            22%  { transform: scale(0.97); }
            30%  { transform: scale(1); }
            70%  { opacity: 1; }
            100% { opacity: 0; transform: scale(0.95) translateY(-4px); }
        }
        .pb-badge {
            animation: pbFlash 2.8s ease forwards;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // --- Google Sheets Sync ---
        const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxWYpcJ-_6Vy6rqyyEqpV9zrSEyZAfbKT8ptCS8YuFF630CZBJv3aioIW52VgFAp-Au/exec';

        // ─── FIX 1: Guaranteed-unique ID generator ────────────────────────────────
        // Using crypto.randomUUID() avoids float IDs that lose precision through
        // JSON round-trips, eliminating the key-collision / delete-mismatch bug.
        function makeId() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                return crypto.randomUUID();
            }
            // Fallback: 16-char hex string
            return Array.from({ length: 16 }, () =>
                Math.floor(Math.random() * 16).toString(16)
            ).join('');
        }

        // ─── FIX 2: Content fingerprint for dedup ────────────────────────────────
        // Used as a secondary dedup key when timestamps don't match.
        function solveFingerprint(s) {
            return `${s.time}|${s.penalty}|${s.scramble}`;
        }

        // Fetch all timestamps currently stored in Sheets (used before importing)
        async function fetchSheetsTimestamps() {
            try {
                const res = await fetch(SHEETS_URL);
                const json = await res.json();
                return new Set((json.timestamps || []).map(String));
            } catch(e) {
                return null;
            }
        }

        // --- Utils & Generators ---
        const MOVES = ["U", "D", "L", "R", "F", "B"];
        const MODIFIERS = ["", "'", "2"];

        function generateScramble(length = 20) {
            let scramble = [];
            let lastMove = "";
            for (let i = 0; i < length; i++) {
                let move;
                do {
                    move = MOVES[Math.floor(Math.random() * MOVES.length)];
                } while (move === lastMove || isOpposite(move, lastMove));
                let modifier = MODIFIERS[Math.floor(Math.random() * MODIFIERS.length)];
                scramble.push(move + modifier);
                lastMove = move;
            }
            return scramble.join(" ");
        }

        function isOpposite(move1, move2) {
            const opposites = { U: "D", D: "U", L: "R", R: "L", F: "B", B: "F" };
            return opposites[move1] === move2;
        }

        function getScrambledState(scrambleStr) {
            if (!scrambleStr) return null;
            const state = {
                U: Array(9).fill('#ffffff'),
                L: Array(9).fill('#ff9826'),
                F: Array(9).fill('#43ff43'),
                R: Array(9).fill('#ff4343'),
                B: Array(9).fill('#246bfd'),
                D: Array(9).fill('#ffff49')
            };
            const cycle = (f1, i1, f2, i2, f3, i3, f4, i4) => {
                let temp = state[f4][i4];
                state[f4][i4] = state[f3][i3];
                state[f3][i3] = state[f2][i2];
                state[f2][i2] = state[f1][i1];
                state[f1][i1] = temp;
            };
            const rotateFaceCW = (f) => {
                const face = state[f];
                const temp = [...face];
                face[0] = temp[6]; face[1] = temp[3]; face[2] = temp[0];
                face[3] = temp[7]; face[4] = temp[4]; face[5] = temp[1];
                face[6] = temp[8]; face[7] = temp[5]; face[8] = temp[2];
            };
            const applyMoveCW = (move) => {
                rotateFaceCW(move);
                if (move === 'U') { cycle('B',2,'R',2,'F',2,'L',2); cycle('B',1,'R',1,'F',1,'L',1); cycle('B',0,'R',0,'F',0,'L',0); }
                else if (move === 'D') { cycle('F',6,'R',6,'B',6,'L',6); cycle('F',7,'R',7,'B',7,'L',7); cycle('F',8,'R',8,'B',8,'L',8); }
                else if (move === 'F') { cycle('U',6,'R',0,'D',2,'L',8); cycle('U',7,'R',3,'D',1,'L',5); cycle('U',8,'R',6,'D',0,'L',2); }
                else if (move === 'B') { cycle('U',2,'L',0,'D',6,'R',8); cycle('U',1,'L',3,'D',7,'R',5); cycle('U',0,'L',6,'D',8,'R',2); }
                else if (move === 'L') { cycle('U',0,'B',8,'D',0,'F',0); cycle('U',3,'B',5,'D',3,'F',3); cycle('U',6,'B',2,'D',6,'F',6); }
                else if (move === 'R') { cycle('F',2,'U',2,'B',6,'D',2); cycle('F',5,'U',5,'B',3,'D',5); cycle('F',8,'U',8,'B',0,'D',8); }
            };
            const moves = scrambleStr.split(' ');
            for (let m of moves) {
                if (!m) continue;
                const face = m[0];
                if (!state[face]) continue;
                const mod = m[1];
                let times = 1;
                if (mod === "'") times = 3;
                else if (mod === '2') times = 2;
                for (let i = 0; i < times; i++) applyMoveCW(face);
            }
            return state;
        }

        function formatTime(ms, penalty = '') {
            if (penalty === 'DNF') return 'DNF';
            let actualMs = ms;
            if (penalty === '+2') actualMs += 2000;
            if (actualMs < 0) return "0.00";
            const totalSeconds = Math.floor(actualMs / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const remainingSeconds = totalSeconds % 60;
            const decimals = Math.floor((actualMs % 1000) / 10);
            let timeStr = "";
            if (minutes > 0) {
                timeStr = `${minutes}:${remainingSeconds.toString().padStart(2, '0')}.${decimals.toString().padStart(2, '0')}`;
            } else {
                timeStr = `${remainingSeconds}.${decimals.toString().padStart(2, '0')}`;
            }
            if (penalty === '+2') timeStr += '+';
            return timeStr;
        }

        function getActualTime(solve) {
            if (solve.penalty === 'DNF') return Infinity;
            if (solve.penalty === '+2') return solve.time + 2000;
            return solve.time;
        }

        function calculateAverage(solves, count) {
            if (solves.length < count) return "-";
            const recent = solves.slice(0, count).map(getActualTime);
            const dnfs = recent.filter(t => t === Infinity).length;
            if (dnfs > 1) return "DNF";
            recent.sort((a, b) => a - b);
            const trimmed = recent.slice(1, -1);
            if (trimmed.includes(Infinity)) return "DNF";
            const sum = trimmed.reduce((acc, val) => acc + val, 0);
            return formatTime(sum / trimmed.length);
        }

        // --- SVGs & Icons ---
        const CaretDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M213.66,101.66l-80,80a8,8,0,0,1-11.32,0l-80-80A8,8,0,0,1,53.66,90.34L128,164.69l74.34-74.35a8,8,0,0,1,11.32,11.32Z"></path></svg>;
        const CloseIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const CubeIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M224,177.3V78.7a8.1,8.1,0,0,0-4.1-7l-88-49.5a7.8,7.8,0,0,0-7.8,0l-88,49.5a8.1,8.1,0,0,0-4.1,7v98.6a8.1,8.1,0,0,0,4.1,7l88,49.5a7.8,7.8,0,0,0,7.8,0l88-49.5A8.1,8.1,0,0,0,224,177.3Z" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></path><polyline points="222.9 74.6 128.9 128 33.1 74.6" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></polyline><line x1="128.9" y1="128" x2="128" y2="234.8" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></line></svg>
        );
        const BanIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line></svg>
        );
        const ArrowLeftIcon = ({ className }) => <svg className={className} width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
        const ArrowRightIcon = ({ className }) => <svg className={className} width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>;
        const ArrowUpIcon = ({ className }) => <svg className={className} width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>;
        const ArrowDownIcon = ({ className }) => <svg className={className} width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>;
        const RotateCwIcon = ({ className }) => <svg className={className} width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><polyline points="21 3 21 8 16 8"></polyline></svg>;
        const RotateCcwIcon = ({ className }) => <svg className={className} width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>;
        const NavigationIcon = ({ className }) => <svg className={className} width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>;
        const CloudIcon = ({ style }) => <svg style={style} width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path></svg>;

        // --- Chart Component ---
        const TimeGraphChart = ({ solves }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (!chartRef.current) return;
                const canvas = chartRef.current;
                const ctx = canvas.getContext('2d');
                const times = solves.map(s => getActualTime(s) / 1000);
                const labels = solves.map((_, i) => `${i + 1}`);

                const calcAo5 = (arr, idx) => {
                    if (idx < 4) return null;
                    const w = arr.slice(idx - 4, idx + 1);
                    const sorted = [...w].sort((a, b) => a - b);
                    const trimmed = sorted.slice(1, -1);
                    return trimmed.reduce((a, b) => a + b, 0) / trimmed.length;
                };
                const calcStdDev = (arr, idx) => {
                    if (idx < 4) return null;
                    const w = arr.slice(idx - 4, idx + 1);
                    const mean = w.reduce((a, b) => a + b, 0) / w.length;
                    const variance = w.reduce((sum, val) => sum + Math.pow(val - mean, 2), 0) / w.length;
                    return Math.sqrt(variance);
                };
                const ao5 = times.map((_, i) => calcAo5(times, i));
                const bandUpper = times.map((_, i) => { const sd = calcStdDev(times, i); const a = ao5[i]; return (sd !== null && a !== null) ? a + sd : null; });
                const bandLower = times.map((_, i) => { const sd = calcStdDev(times, i); const a = ao5[i]; return (sd !== null && a !== null) ? a - sd : null; });
                const bestIdx = times.indexOf(Math.min(...times));
                const fmtAxis = (sec) => Math.round(sec) + 's';
                const fmtMin = (sec) => { const m = Math.floor(sec / 60); const s = sec % 60; const sFixed = s.toFixed(2); return m > 0 ? m + ':' + sFixed.padStart(5, '0') : sFixed; };

                if (chartInstance.current) chartInstance.current.destroy();

                const h = canvas.parentElement.clientHeight || 240;
                const solveGrad = ctx.createLinearGradient(0, 0, 0, h);
                solveGrad.addColorStop(0, 'rgba(36, 107, 253, 0.12)');
                solveGrad.addColorStop(0.5, 'rgba(36, 107, 253, 0.03)');
                solveGrad.addColorStop(1, 'rgba(36, 107, 253, 0)');

                const crosshairPlugin = {
                    id: 'crosshair',
                    afterDraw(chart) {
                        const tt = chart.tooltip;
                        if (!tt || !tt.getActiveElements().length) return;
                        const x = tt.getActiveElements()[0].element.x;
                        const yAxis = chart.scales.y;
                        const c = chart.ctx;
                        c.save(); c.beginPath(); c.setLineDash([3, 4]); c.moveTo(x, yAxis.top); c.lineTo(x, yAxis.bottom);
                        c.lineWidth = 1; c.strokeStyle = 'rgba(255, 255, 255, 0.1)'; c.stroke(); c.restore();
                    }
                };

                const pointBg = times.map((_, i) => i === bestIdx ? '#22c55e' : '#181b25');
                const pointBorder = times.map((_, i) => i === bestIdx ? '#22c55e' : '#246bfd');
                const pointSize = times.map((_, i) => i === bestIdx ? 5 : 3);

                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    plugins: [crosshairPlugin],
                    data: {
                        labels,
                        datasets: [
                            { label: '_bandUpper', data: bandUpper, borderColor: 'transparent', backgroundColor: 'transparent', pointRadius: 0, pointHitRadius: 0, fill: false, tension: 0.4, order: 5 },
                            { label: '_bandLower', data: bandLower, borderColor: 'rgba(34, 197, 94, 0.15)', borderWidth: 1, backgroundColor: 'rgba(34, 197, 94, 0.06)', pointRadius: 0, pointHitRadius: 0, fill: '-1', tension: 0.4, order: 4 },
                            { label: 'Ao5', data: ao5, borderColor: '#22c55e', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 0, pointHoverRadius: 5, pointHoverBackgroundColor: '#22c55e', pointHoverBorderColor: 'rgba(34,197,94,0.25)', pointHoverBorderWidth: 6, fill: false, tension: 0.4, order: 2, borderCapStyle: 'round', borderJoinStyle: 'round' },
                            { label: 'Solve', data: times, borderColor: '#246bfd', backgroundColor: solveGrad, borderWidth: 2, pointBackgroundColor: pointBg, pointBorderColor: pointBorder, pointBorderWidth: 2, pointRadius: pointSize, pointHoverRadius: 6, pointHoverBackgroundColor: '#246bfd', pointHoverBorderColor: 'rgba(36,107,253,0.25)', pointHoverBorderWidth: 8, fill: true, tension: 0.3, order: 1, borderCapStyle: 'round', borderJoinStyle: 'round' }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        layout: { padding: { top: 6, right: 6, bottom: 0, left: 0 } },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                enabled: false,
                                external: function(context) {
                                    let tooltipEl = document.getElementById('chartjs-tooltip-cuboid');
                                    if (!tooltipEl) { tooltipEl = document.createElement('div'); tooltipEl.id = 'chartjs-tooltip-cuboid'; tooltipEl.style.cssText = 'position:fixed;pointer-events:none;z-index:9999;transition:opacity 0.15s ease,transform 0.15s ease;opacity:0;transform:translateY(4px);'; document.body.appendChild(tooltipEl); }
                                    const tooltip = context.tooltip;
                                    if (tooltip.opacity === 0) { tooltipEl.style.opacity = '0'; tooltipEl.style.transform = 'translateY(4px)'; return; }
                                    const idx = tooltip.dataPoints[0].dataIndex;
                                    const time = times[idx]; const a5 = ao5[idx]; const sd = calcStdDev(times, idx); const isPB = idx === bestIdx;
                                    let html = '<div style="background:rgba(12,13,20,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 14px;backdrop-filter:blur(12px);min-width:130px;">';
                                    html += '<div style="font-family:Inter,sans-serif;font-size:10px;font-weight:600;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Solve #' + labels[idx] + (isPB ? ' <span style="color:#22c55e;">\u2605 PB</span>' : '') + '</div>';
                                    html += '<div style="display:flex;align-items:baseline;gap:4px;margin-bottom:' + (a5 !== null ? '5' : '0') + 'px;"><span style="font-family:\'Roboto Mono\',monospace;font-size:18px;font-weight:700;color:#fff;">' + fmtMin(time) + '</span></div>';
                                    if (a5 !== null) { html += '<div style="display:flex;justify-content:space-between;gap:12px;">'; html += '<div style="font-family:\'Roboto Mono\',monospace;font-size:11px;color:#22c55e;">ao5 ' + fmtMin(a5) + '</div>'; if (sd !== null) html += '<div style="font-family:\'Roboto Mono\',monospace;font-size:11px;color:rgba(255,255,255,0.3);">\u00b1' + sd.toFixed(1) + 's</div>'; html += '</div>'; }
                                    html += '</div>';
                                    tooltipEl.innerHTML = html; tooltipEl.style.opacity = '1'; tooltipEl.style.transform = 'translateY(0)';
                                    const canvasRect = context.chart.canvas.getBoundingClientRect();
                                    let left = canvasRect.left + tooltip.caretX + 12; let top = canvasRect.top + tooltip.caretY - 30;
                                    const tipRect = tooltipEl.getBoundingClientRect();
                                    if (left + tipRect.width > window.innerWidth - 8) left = canvasRect.left + tooltip.caretX - tipRect.width - 12;
                                    if (top < 8) top = 8;
                                    tooltipEl.style.left = left + 'px'; tooltipEl.style.top = top + 'px';
                                }
                            }
                        },
                        scales: {
                            x: { display: true, grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.2)', font: { family: 'Roboto Mono', size: 9 }, maxTicksLimit: 10, padding: 4 }, border: { display: false } },
                            y: { grid: { color: 'rgba(255,255,255,0.04)', drawTicks: false }, ticks: { color: 'rgba(255,255,255,0.25)', font: { family: 'Roboto Mono', size: 10 }, maxTicksLimit: 5, callback: function(v) { return fmtAxis(v); }, padding: 8 }, border: { display: false } }
                        },
                        interaction: { mode: 'index', intersect: false },
                        animation: { duration: 600, easing: 'easeOutQuart' }
                    }
                });

                return () => {
                    if (chartInstance.current) chartInstance.current.destroy();
                    const tip = document.getElementById('chartjs-tooltip-cuboid');
                    if (tip) { tip.style.opacity = '0'; tip.remove(); }
                };
            }, [solves]);

            return <canvas ref={chartRef} className="w-full h-full" />;
        };

        // --- Dropdown ---
        const Dropdown = ({ label, options, selected, onSelect }) => {
            const [isOpen, setIsOpen] = useState(false);
            const ref = useRef(null);
            useEffect(() => {
                const handleClickOutside = (event) => { if (ref.current && !ref.current.contains(event.target)) setIsOpen(false); };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);
            const filteredOptions = options.filter(opt => opt !== selected);
            return (
                <div className="relative z-[60]" ref={ref}>
                    <button onClick={() => setIsOpen(!isOpen)} className={`bg-primary hover:bg-blue-500 text-white text-sm font-semibold px-3 py-1.5 rounded flex items-center gap-1 transition-all glow-blue ${isOpen ? 'active' : ''}`}>
                        {label} <CaretDown />
                    </button>
                    {isOpen && (
                        <div className="absolute top-full left-0 mt-1 w-48 bg-[#181b25] border border-white/10 rounded-lg shadow-xl overflow-y-auto max-h-60 py-1 no-scrollbar z-[70]">
                            {filteredOptions.map(opt => (
                                <button key={opt} onClick={() => { onSelect(opt); setIsOpen(false); }} className={`w-full text-left px-4 py-2.5 text-sm font-medium hover:bg-white/5 transition-colors ${selected === opt ? 'text-white' : 'text-gray-300'}`}>
                                    {opt}
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const DEFAULT_STATS_CONFIG = [
            { id: 1, type: 'Single', result: 'Best', label: 'pb', count: null, colSpan: 1, rowSpan: 2 },
            { id: 2, type: 'Single', result: 'Worst', label: 'worst', count: null, colSpan: 1, rowSpan: 1 },
            { id: 3, type: 'Average', result: 'Current', label: 'avg', count: null, colSpan: 1, rowSpan: 1 },
            { id: 4, type: 'Average', result: 'Best', label: 'ao5 pb', count: 5, colSpan: 1, rowSpan: 1 },
            { id: 5, type: 'Average', result: 'Current', label: 'ao5', count: 5, colSpan: 1, rowSpan: 1 },
            { id: 6, type: 'Average', result: 'Best', label: 'ao12 pb', count: 12, colSpan: 1, rowSpan: 1 },
            { id: 7, type: 'Average', result: 'Current', label: 'ao12', count: 12, colSpan: 1, rowSpan: 1 },
        ];

        // ─── FIX 3: migrate old numeric IDs to UUID strings on load ─────────────
        function migrateSolves(parsed) {
            return parsed.map(s => {
                const needsNewId = !s.id || typeof s.id === 'number';
                return {
                    ...s,
                    id: needsNewId ? makeId() : s.id,
                    timestamp: s.timestamp || (typeof s.id === 'number' ? Math.floor(s.id) : 0),
                };
            });
        }

        // --- Main App ---
        function App() {
            const [solves, setSolves] = useState(() => {
                try {
                    const saved = localStorage.getItem('cuboid-solves');
                    const parsed = saved ? JSON.parse(saved) : [];
                    return migrateSolves(parsed);
                } catch(e) { return []; }
            });
            const [statsConfig, setStatsConfig] = useState(() => {
                try { const s = localStorage.getItem('cuboid-stats'); return s ? JSON.parse(s) : DEFAULT_STATS_CONFIG; } catch(e) { return DEFAULT_STATS_CONFIG; }
            });
            const [panels, setPanels] = useState(() => {
                try { const s = localStorage.getItem('cuboid-panels'); return s ? JSON.parse(s) : ['Solves', 'Stats', 'Scramble']; } catch(e) { return ['Solves', 'Stats', 'Scramble']; }
            });
            const [scrambleMode, setScrambleMode] = useState(() => {
                try { const s = localStorage.getItem('cuboid-scramble-mode'); return s !== null ? JSON.parse(s) : true; } catch(e) { return true; }
            });
            const [showArrows, setShowArrows] = useState(() => {
                try { const s = localStorage.getItem('cuboid-show-arrows'); return s !== null ? JSON.parse(s) : false; } catch(e) { return false; }
            });
            const [isLocked, setIsLocked] = useState(() => {
                try { const s = localStorage.getItem('cuboid-is-locked'); return s !== null ? JSON.parse(s) : false; } catch(e) { return false; }
            });
            const [scramble, setScramble] = useState(() => {
                try { const s = localStorage.getItem('cuboid-current-scramble'); return s !== null ? s : ""; } catch(e) { return ""; }
            });

            const [cubeState, setCubeState] = useState(null);
            const [showPbBadge, setShowPbBadge] = useState(false);
            const pbBadgeTimer = useRef(null);
            useEffect(() => {
                if (showPbBadge) {
                    clearTimeout(pbBadgeTimer.current);
                    pbBadgeTimer.current = setTimeout(() => setShowPbBadge(false), 2850);
                }
                return () => clearTimeout(pbBadgeTimer.current);
            }, [showPbBadge]);
            const [cloudStatus, setCloudStatus] = useState('idle');
            const panelOptions = useMemo(() => ['Solves', 'Stats', 'Scramble', 'Time Graph', 'Export CSV', 'Import CSV', 'None'], []);
            const [timerState, setTimerState] = useState('idle');
            const [timeMs, setTimeMs] = useState(() => {
                try { const s = localStorage.getItem('cuboid-solves'); const p = s ? JSON.parse(s) : []; return p.length > 0 ? p[0].time : 0; } catch(e) { return 0; }
            });
            const timerRef = useRef(null);
            const startTimeRef = useRef(0);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedBlockId, setSelectedBlockId] = useState(1);

            // Export CSV
            const handleExportCSV = useCallback(() => {
                if (solves.length === 0) return;
                const csvContent = "data:text/csv;charset=utf-8," + "Time (ms),Penalty,Scramble,Timestamp\n" + solves.map(s => `${s.time},${s.penalty},"${s.scramble}",${s.timestamp || ''}`).join("\n");
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csvContent));
                link.setAttribute("download", `cuboid_solves_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }, [solves]);

            // ─── FIX 4: Robust Import — dual-key dedup (timestamp + content fingerprint) ─
            const handleImportCSV = useCallback(() => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.csv';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const text = event.target.result;
                        const lines = text.split('\n').slice(1);
                        const importedSolves = lines.filter(line => line.trim()).map(line => {
                            const parts = line.split(',');
                            const time = parseInt(parts[0]?.trim());
                            const penalty = parts[1]?.trim() || '';
                            const scrambleMatch = line.match(/"([^"]*)"/);
                            const scramble = scrambleMatch ? scrambleMatch[1] : parts[2]?.trim() || '';
                            const lastField = parts[parts.length - 1]?.trim();
                            const timestamp = lastField && /^\d{10,}$/.test(lastField) ? parseInt(lastField) : 0;
                            if (!isNaN(time)) {
                                return {
                                    id: makeId(),           // Always fresh UUID — no float ID risk
                                    time,
                                    penalty,
                                    scramble,
                                    timestamp: timestamp || Date.now(),
                                };
                            }
                            return null;
                        }).filter(Boolean);

                        if (importedSolves.length === 0) return;

                        setSolves(prev => {
                            // Build two dedup sets from existing solves
                            const existingTs  = new Set(prev.map(s => String(s.timestamp)).filter(t => t !== '0'));
                            const existingFps = new Set(prev.map(solveFingerprint));

                            const toAdd = importedSolves.filter(imp => {
                                // Skip if timestamp already present
                                if (imp.timestamp && existingTs.has(String(imp.timestamp))) return false;
                                // Skip if identical time+penalty+scramble already present
                                if (existingFps.has(solveFingerprint(imp))) return false;
                                return true;
                            });

                            if (toAdd.length === 0) return prev;  // Nothing new → no state change

                            const merged = [...prev, ...toAdd];
                            merged.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                            return merged;
                        });

                        // Push only truly new solves to Sheets in background
                        fetchSheetsTimestamps().then(sheetsTimestamps => {
                            if (sheetsTimestamps === null) return;
                            const solvesToPush = importedSolves.filter(s =>
                                s.timestamp && !sheetsTimestamps.has(String(s.timestamp))
                            );
                            if (solvesToPush.length > 0) {
                                fetch(SHEETS_URL, { method: 'POST', body: JSON.stringify(solvesToPush) })
                                    .then(r => r.json())
                                    .then(json => {
                                        setCloudStatus(json.status === 'success' ? 'success' : 'error');
                                        setTimeout(() => setCloudStatus('idle'), 1500);
                                    })
                                    .catch(() => { setCloudStatus('error'); setTimeout(() => setCloudStatus('idle'), 1500); });
                            }
                        });
                    };
                    reader.readAsText(file);
                };
                input.click();
            }, []);

            // LocalStorage persistence
            useEffect(() => { localStorage.setItem('cuboid-solves', JSON.stringify(solves)); }, [solves]);
            useEffect(() => { localStorage.setItem('cuboid-stats', JSON.stringify(statsConfig)); }, [statsConfig]);
            useEffect(() => { localStorage.setItem('cuboid-panels', JSON.stringify(panels)); }, [panels]);
            useEffect(() => { localStorage.setItem('cuboid-scramble-mode', JSON.stringify(scrambleMode)); }, [scrambleMode]);
            useEffect(() => { localStorage.setItem('cuboid-show-arrows', JSON.stringify(showArrows)); }, [showArrows]);
            useEffect(() => { localStorage.setItem('cuboid-is-locked', JSON.stringify(isLocked)); }, [isLocked]);
            useEffect(() => { localStorage.setItem('cuboid-current-scramble', scramble); }, [scramble]);

            useEffect(() => {
                if (scrambleMode && scramble === "") setScramble(generateScramble());
            }, []);

            useEffect(() => {
                if (scrambleMode && scramble) setCubeState(getScrambledState(scramble));
                else setCubeState(null);
            }, [scramble, scrambleMode]);

            const toggleScrambleMode = useCallback(() => {
                if (!scrambleMode) {
                    const next = generateScramble();
                    setScramble(next);
                    setScrambleMode(true);
                } else {
                    setScramble("");
                    setScrambleMode(false);
                }
            }, [scrambleMode]);

            const updateTime = useCallback(() => {
                setTimeMs(Date.now() - startTimeRef.current);
                timerRef.current = requestAnimationFrame(updateTime);
            }, []);

            const startTimer = useCallback(() => {
                startTimeRef.current = Date.now();
                setTimerState('running');
                timerRef.current = requestAnimationFrame(updateTime);
            }, [updateTime]);

            const syncToSheets = useCallback(async (solveData) => {
                try {
                    const res = await fetch(SHEETS_URL, { method: 'POST', body: JSON.stringify(solveData) });
                    const json = await res.json();
                    setCloudStatus(json.status === 'success' ? 'success' : 'error');
                } catch(e) { setCloudStatus('error'); }
                setTimeout(() => setCloudStatus('idle'), 1500);
            }, []);

            // ─── FIX 5: deleteFromSheets called OUTSIDE setState updater ─────────────
            // Previously this was called inside the setSolves updater, which caused
            // setCloudStatus to fire mid-update and triggered React to re-reconcile
            // the list using stale closures — making the delete appear to silently fail.
            const deleteFromSheets = useCallback(async (timestamp) => {
                if (!timestamp) return;
                try {
                    const res = await fetch(SHEETS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'delete', timestamp }),
                    });
                    const json = await res.json();
                    setCloudStatus(json.status === 'success' ? 'success' : 'error');
                } catch(e) {
                    setCloudStatus('error');
                }
                setTimeout(() => setCloudStatus('idle'), 1500);
            }, []);

            const stopTimer = useCallback(() => {
                cancelAnimationFrame(timerRef.current);
                setTimerState('idle');
                const finalTime = Date.now() - startTimeRef.current;
                setTimeMs(finalTime);

                const now = Date.now();
                const newSolve = {
                    id: makeId(),       // UUID, not a timestamp float
                    time: finalTime,
                    penalty: '',
                    scramble: scrambleMode ? scramble : 'No Scramble',
                    timestamp: now
                };

                setSolves(prev => {
                    const validTimes = prev.map(getActualTime).filter(t => t !== Infinity);
                    if (validTimes.length === 0 || finalTime < Math.min(...validTimes)) setShowPbBadge(true);
                    else setShowPbBadge(false);
                    return [newSolve, ...prev];
                });

                syncToSheets(newSolve);

                if (!isLocked && scrambleMode) {
                    const next = generateScramble();
                    setScramble(next);
                    setCubeState(getScrambledState(next));
                }
            }, [scramble, isLocked, scrambleMode, syncToSheets]);

            // ─── FIX 6: deleteSolve — side effect moved outside the updater ──────────
            // The updater function is now pure (no async calls inside).
            // deleteFromSheets is called after setSolves, not inside it.
            const deleteSolve = useCallback((id) => {
                let timestampToDelete = null;
                setSolves(prev => {
                    const target = prev.find(s => s.id === id);
                    if (target) timestampToDelete = target.timestamp;
                    return prev.filter(s => s.id !== id);
                });
                // Defer Sheets delete to next tick so it's outside the render cycle
                setTimeout(() => {
                    if (timestampToDelete) deleteFromSheets(timestampToDelete);
                }, 0);
            }, [deleteFromSheets]);

            // ─── FIX 7: Remove all duplicates utility ────────────────────────────────
            // Keeps the first occurrence of each (timestamp, fingerprint) pair.
            const removeDuplicates = useCallback(() => {
                setSolves(prev => {
                    const seenTs  = new Set();
                    const seenFps = new Set();
                    return prev.filter(s => {
                        const tsKey = String(s.timestamp);
                        const fp    = solveFingerprint(s);
                        if ((s.timestamp && seenTs.has(tsKey)) || seenFps.has(fp)) return false;
                        if (s.timestamp) seenTs.add(tsKey);
                        seenFps.add(fp);
                        return true;
                    });
                });
            }, []);

            const handleTouchStart = useCallback((e) => {
                if (isModalOpen) return;
                e.preventDefault();
                if (timerState === 'idle') { setTimerState('ready'); setTimeMs(0); setShowPbBadge(false); }
                else if (timerState === 'running') stopTimer();
            }, [timerState, stopTimer, isModalOpen]);

            const handleTouchEnd = useCallback((e) => {
                if (isModalOpen) return;
                e.preventDefault();
                if (timerState === 'ready') startTimer();
            }, [timerState, startTimer, isModalOpen]);

            useEffect(() => {
                if (isModalOpen) return;
                const handleKeyDown = (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        if (e.repeat) return;
                        if (timerState === 'idle') { setTimerState('ready'); setTimeMs(0); setShowPbBadge(false); }
                        else if (timerState === 'running') stopTimer();
                    }
                };
                const handleKeyUp = (e) => {
                    if (e.code === 'Space') { e.preventDefault(); if (timerState === 'ready') startTimer(); }
                };
                window.addEventListener('keydown', handleKeyDown);
                window.addEventListener('keyup', handleKeyUp);
                return () => { window.removeEventListener('keydown', handleKeyDown); window.removeEventListener('keyup', handleKeyUp); };
            }, [timerState, startTimer, stopTimer, isModalOpen]);

            const handleCopyScramble = () => {
                if (!scramble) return;
                navigator.clipboard.writeText(scramble).then(() => {
                    const btn = document.getElementById('copyBtn');
                    if (btn) { btn.style.color = '#22c55e'; setTimeout(() => btn.style.color = '', 1000); }
                }).catch(() => {});
            };

            const handleNewScramble = () => setScramble(generateScramble());

            const togglePenalty = useCallback((id, type) => {
                setSolves(prev => {
                    const updated = prev.map(s => {
                        if (s.id !== id) return s;
                        return { ...s, penalty: s.penalty === type ? '' : type };
                    });
                    const updatedSolve = updated.find(s => s.id === id);
                    if (updatedSolve && updatedSolve.timestamp) {
                        fetch(SHEETS_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: 'updatePenalty', timestamp: updatedSolve.timestamp, penalty: updatedSolve.penalty }),
                        }).catch(() => {});
                    }
                    return updated;
                });
            }, []);

            const calcStatValue = useCallback((config, allSolves) => {
                const validTimes = allSolves.map(getActualTime).filter(t => t !== Infinity);
                if (validTimes.length === 0) return allSolves.length > 0 ? "DNF" : "-";
                if (config.type === 'Single') {
                    if (config.result === 'Best') return formatTime(Math.min(...validTimes));
                    if (config.result === 'Worst') return formatTime(Math.max(...validTimes));
                } else {
                    if (!config.count) return formatTime(validTimes.reduce((a, b) => a + b, 0) / validTimes.length);
                    if (config.result === 'Current') return calculateAverage(allSolves, config.count);
                    if (config.result === 'Best') {
                        let bestAvg = Infinity;
                        for (let i = 0; i <= allSolves.length - config.count; i++) {
                            const avgStr = calculateAverage(allSolves.slice(i, i + config.count), config.count);
                            if (avgStr !== "DNF" && avgStr !== "-") {
                                const avgNum = parseFloat(avgStr) * 1000;
                                if (avgNum < bestAvg) bestAvg = avgNum;
                            }
                        }
                        return bestAvg === Infinity ? "-" : formatTime(bestAvg);
                    }
                }
                return "-";
            }, []);

            const getVisualMap = useCallback(() => {
                if (!cubeState) return Array(12).fill(null);
                return [null, cubeState.U, null, null, cubeState.L, cubeState.F, cubeState.R, cubeState.B, null, cubeState.D, null, null];
            }, [cubeState]);

            const totalArea = useMemo(() => statsConfig.reduce((acc, block) => acc + ((block.colSpan || 1) * (block.rowSpan || 1)), 0), [statsConfig]);
            const statsRowsNeeded = Math.max(1, Math.ceil(totalArea / 2));

            // Detect duplicates for the "Remove Duplicates" button
            const duplicateCount = useMemo(() => {
                const seenTs  = new Set();
                const seenFps = new Set();
                let count = 0;
                solves.forEach(s => {
                    const tsKey = String(s.timestamp);
                    const fp    = solveFingerprint(s);
                    if ((s.timestamp && seenTs.has(tsKey)) || seenFps.has(fp)) { count++; return; }
                    if (s.timestamp) seenTs.add(tsKey);
                    seenFps.add(fp);
                });
                return count;
            }, [solves]);

            const renderPanelContent = (type, index) => {
                switch (type) {
                    case 'Solves':
                        return (
                            <div className="w-full h-full flex flex-col p-3">
                                {/* ─── FIX 8: "Remove Duplicates" banner shown only when dupes exist ── */}
                                {duplicateCount > 0 && (
                                    <div className="flex items-center justify-between bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-1.5 mb-2 flex-shrink-0">
                                        <span className="text-red-400 text-xs font-semibold">{duplicateCount} duplicate{duplicateCount > 1 ? 's' : ''} detected</span>
                                        <button onClick={removeDuplicates} className="text-red-400 hover:text-white text-xs font-bold underline transition-colors ml-2">Remove all</button>
                                    </div>
                                )}
                                {solves.length === 0 ? (
                                    <div className="text-center opacity-50 flex flex-col items-center justify-center h-full">
                                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" className="mb-2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                                        <p className="text-sm">No solves yet</p>
                                    </div>
                                ) : (
                                    <div className="overflow-y-auto no-scrollbar flex-1">
                                        {solves.map((s, idx) => (
                                            <div key={s.id} className="flex justify-between items-center py-2 text-sm font-mono group/row px-3 hover:bg-white/5 rounded-lg transition-colors">
                                                <div className="flex items-center gap-4 flex-1">
                                                    <span className="text-white/40 font-bold w-6">{solves.length - idx}.</span>
                                                    <span className={`font-bold text-[15px] ${s.penalty === 'DNF' ? 'text-gray-500 line-through' : 'text-[#22c55e]'}`}>
                                                        {formatTime(s.time, s.penalty)}
                                                    </span>
                                                </div>
                                                <div className="flex items-center gap-3 font-bold text-xs tracking-wider">
                                                    <button onClick={() => togglePenalty(s.id, '+2')} className={`transition-colors ${s.penalty === '+2' ? 'text-white' : 'text-gray-500 hover:text-white'}`} aria-label="Add +2 penalty">+2</button>
                                                    <button onClick={() => togglePenalty(s.id, 'DNF')} className={`transition-colors ${s.penalty === 'DNF' ? 'text-white' : 'text-gray-500 hover:text-white'}`} aria-label="Add DNF penalty">DNF</button>
                                                    <button
                                                        onClick={(e) => { e.stopPropagation(); deleteSolve(s.id); }}
                                                        className="text-gray-500 hover:text-white ml-2 flex items-center justify-center"
                                                        aria-label="Delete solve"
                                                    ><CloseIcon /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        );
                    case 'Stats':
                        return (
                            <>
                                <div className="absolute top-3 right-3 opacity-0 group-hover:opacity-100 focus-within:opacity-100 transition-opacity z-30">
                                    <button onClick={() => setIsModalOpen(true)} className="bg-success text-black text-xs font-bold px-3 py-1.5 rounded glow-green transition-all shadow-lg">Customize Stats</button>
                                </div>
                                <div className="grid gap-2 h-full w-full p-3" style={{ gridTemplateColumns: 'repeat(2, minmax(0, 1fr))', gridTemplateRows: `repeat(${statsRowsNeeded}, minmax(0, 1fr))` }}>
                                    {statsConfig.map(block => (
                                        <div key={block.id} className="bg-white/[0.04] rounded-lg p-3 flex flex-col justify-between overflow-hidden" style={{ gridColumn: `span ${block.colSpan || 1}`, gridRow: `span ${block.rowSpan || 1}` }}>
                                            <span className="text-[13px] font-bold text-gray-400 leading-none mb-1">{block.label}</span>
                                            <div className={`w-full flex-1 flex items-center justify-center font-bold text-white leading-none ${block.rowSpan > 1 ? 'text-[48px]' : 'text-[26px]'}`}>{calcStatValue(block, solves)}</div>
                                        </div>
                                    ))}
                                </div>
                            </>
                        );
                    case 'Scramble':
                        return (
                            <div className="w-full h-full flex items-center justify-center p-3">
                                {cubeState ? (
                                    <div className="cube-grid aspect-[4/3]">
                                        {getVisualMap().map((face, i) => (
                                            <div key={i} className={face ? "cube-face" : ""}>
                                                {face && face.map((color, j) => <div key={j} className="cube-sticker" style={{ backgroundColor: color }}></div>)}
                                            </div>
                                        ))}
                                    </div>
                                ) : <div className="opacity-30 text-sm">Scramble Disabled</div>}
                            </div>
                        );
                    case 'Time Graph': {
                        const validGraphSolves = [...solves].reverse().filter(s => getActualTime(s) !== Infinity);
                        if (validGraphSolves.length < 2) return <div className="w-full h-full flex items-center justify-center opacity-50 text-sm">Need at least 2 valid solves</div>;
                        return (
                            <div className="w-full h-full flex flex-col" style={{ padding: '12px 10px 8px' }}>
                                <div className="flex-1 w-full relative" style={{ minHeight: 0 }}><TimeGraphChart solves={validGraphSolves} /></div>
                                <div className="flex gap-5 justify-center pt-1.5" style={{ flexShrink: 0 }}>
                                    <div className="flex items-center gap-1.5"><div style={{ width: 7, height: 7, borderRadius: '50%', background: '#246bfd', boxShadow: '0 0 6px rgba(36,107,253,0.5)' }}></div><span className="text-[10px] font-medium" style={{ color: 'rgba(255,255,255,0.3)' }}>Solves</span></div>
                                    <div className="flex items-center gap-1.5"><div style={{ width: 14, height: 2, borderRadius: 1, background: '#22c55e', boxShadow: '0 0 6px rgba(34,197,94,0.4)' }}></div><span className="text-[10px] font-medium" style={{ color: 'rgba(255,255,255,0.3)' }}>Ao5</span></div>
                                    <div className="flex items-center gap-1.5"><div style={{ width: 12, height: 8, borderRadius: 2, background: 'rgba(34,197,94,0.1)', border: '1px solid rgba(34,197,94,0.2)' }}></div><span className="text-[10px] font-medium" style={{ color: 'rgba(255,255,255,0.3)' }}>&plusmn;1&sigma;</span></div>
                                    <div className="flex items-center gap-1.5"><div style={{ width: 7, height: 7, borderRadius: '50%', background: '#22c55e', boxShadow: '0 0 6px rgba(34,197,94,0.5)' }}></div><span className="text-[10px] font-medium" style={{ color: 'rgba(255,255,255,0.3)' }}>PB</span></div>
                                </div>
                            </div>
                        );
                    }
                    case 'None':
                        return <div className="w-full h-full flex items-center justify-center opacity-30 text-sm">Empty Panel</div>;
                    default:
                        return null;
                }
            };

            const timerColor = timerState === 'ready' ? 'text-green-500' : 'text-textMain';

            return (
                <div className="flex flex-col min-h-screen font-sans bg-bg overflow-x-hidden relative">
                    <header className="flex flex-wrap items-center justify-between p-4 gap-2 relative z-10">
                        <div className="flex gap-2 text-white font-bold text-lg items-center opacity-80">
                            <CubeIcon /> <span>3x3</span>
                        </div>
                    </header>

                    <main className="flex-1 flex flex-col items-center justify-center py-4 px-4 min-h-[35vh]">
                        <div className="text-center w-full max-w-4xl px-2">
                            <div className="h-8 mb-2 flex justify-center items-center">
                                {showPbBadge && <span key={Date.now()} className="pb-badge bg-[#00ba55] text-white text-sm font-semibold px-4 py-1.5 rounded shadow-[0_0_20px_rgba(0,186,85,0.4)]">New 3×3 Single PB!</span>}
                            </div>
                            
                            <div className="font-mono text-base md:text-[21px] leading-[1.6] tracking-wide text-white mb-4 sm:mb-6 min-h-[80px] flex items-end justify-center font-medium">
                                {scrambleMode ? (
                                    showArrows && scramble ? (
                                        <div className="flex flex-wrap justify-center items-end gap-y-2">
                                            {scramble.split(' ').map((move, i) => {
                                                if (!move) return null;
                                                const base = move[0]; const mod = move[1] || '';
                                                const isPrime = mod === "'"; const isDouble = mod === "2";
                                                let Arrow = null;
                                                if (base === 'U') Arrow = isPrime ? ArrowRightIcon : ArrowLeftIcon;
                                                if (base === 'D') Arrow = isPrime ? ArrowLeftIcon : ArrowRightIcon;
                                                if (base === 'R') Arrow = isPrime ? ArrowDownIcon : ArrowUpIcon;
                                                if (base === 'L') Arrow = isPrime ? ArrowUpIcon : ArrowDownIcon;
                                                if (base === 'F') Arrow = isPrime ? RotateCcwIcon : RotateCwIcon;
                                                if (base === 'B') Arrow = isPrime ? RotateCwIcon : RotateCcwIcon;
                                                if (isDouble) {
                                                    if (base === 'U') Arrow = ArrowLeftIcon; if (base === 'D') Arrow = ArrowRightIcon;
                                                    if (base === 'R') Arrow = ArrowUpIcon; if (base === 'L') Arrow = ArrowDownIcon;
                                                    if (base === 'F') Arrow = RotateCwIcon; if (base === 'B') Arrow = RotateCcwIcon;
                                                }
                                                return (
                                                    <div key={i} className="flex flex-col items-center mx-1 gap-1">
                                                        <span>{move}</span>
                                                        <div className="flex text-primary opacity-90 text-[18px]">
                                                            {Arrow && <Arrow />}
                                                            {isDouble && Arrow && <Arrow className="-ml-2" />}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    ) : <span>{scramble}</span>
                                ) : null}
                            </div>
                            
                            <div className="flex gap-4 sm:gap-6 justify-center text-gray-500 mb-4 sm:mb-8 flex-wrap transition-colors">
                                <button onClick={toggleScrambleMode} className={`transition-colors ${!scrambleMode ? 'text-red-500' : 'hover:text-white'}`} title={scrambleMode ? "Turn Off Scramble" : "Turn On Scramble"}><BanIcon /></button>
                                {scrambleMode && (
                                    <>
                                        <button onClick={() => setShowArrows(!showArrows)} className={`transition-colors ${showArrows ? 'text-primary' : 'hover:text-white'}`} title="Toggle Move Arrows"><NavigationIcon className="w-[18px] h-[18px]" /></button>
                                        <CloudIcon style={{ transition: 'color 0.2s, filter 0.2s', color: cloudStatus === 'success' ? '#22c55e' : cloudStatus === 'error' ? '#ef4444' : 'rgb(107,114,128)', filter: cloudStatus === 'success' ? 'drop-shadow(0 0 6px #22c55e)' : cloudStatus === 'error' ? 'drop-shadow(0 0 6px #ef4444)' : 'none', pointerEvents: 'none', flexShrink: 0 }} />
                                        <button onClick={() => setIsLocked(!isLocked)} className={`transition-colors ${isLocked ? 'text-primary' : 'hover:text-white'}`} title="Lock Scramble">
                                            {isLocked ? <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 256 256"><rect width="256" height="256" fill="none"></rect><rect x="40" y="88" width="176" height="128" rx="8" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></rect><path d="M92,88V52a36,36,0,0,1,72,0V88" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></path><circle cx="128" cy="152" r="16"></circle></svg>
                                            : <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 256 256"><rect x="40" y="88" width="176" height="128" rx="8" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></rect><path d="M92,88v-40a36,36,0,0,1,72,0v16" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></path><circle cx="128" cy="152" r="16"></circle></svg>}
                                        </button>
                                        <button id="copyBtn" onClick={handleCopyScramble} className="hover:text-white transition-colors" title="Copy Scramble"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 256 256"><polyline points="168 168 216 168 216 40 88 40 88 88" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></polyline><rect x="40" y="88" width="128" height="128" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></rect></svg></button>
                                        <button onClick={handleNewScramble} className="hover:text-white transition-colors" title="New Scramble"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 256 256"><polyline points="176.2 99.7 224.2 99.7 224.2 51.7" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></polyline><path d="M190.2,190.2a88,88,0,1,1,0-124.4l34,33.9" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></path></svg></button>
                                    </>
                                )}
                            </div>
                        </div>

                        <div className="relative group">
                            <div className={`font-mono text-[80px] sm:text-[110px] md:text-[130px] lg:text-[160px] leading-none font-medium mb-8 sm:mb-12 transition-colors duration-100 ${timerColor} tabular-nums tracking-tight cursor-pointer select-none`} onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
                                {timerState === 'idle' && solves.length > 0 && timeMs === solves[0].time ? formatTime(solves[0].time, solves[0].penalty) : formatTime(timeMs)}
                            </div>
                            {timerState === 'idle' && (
                                <div className="md:block absolute bottom-2 left-1/2 -translate-x-1/2 whitespace-nowrap text-sm text-gray-400 opacity-0 group-hover:opacity-100 transition-opacity duration-200 pointer-events-none">
                                    Press and hold space to prime timer
                                </div>
                            )}
                        </div>
                    </main>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 lg:gap-6 p-4 lg:p-6 bg-transparent w-full max-w-[1400px] mx-auto mt-auto">
                        {panels.map((panelType, index) => (
                            <div key={`${panelType}-${index}`} className={`bg-module rounded-xl relative group h-[280px] flex flex-col w-full shadow-lg transition-all ${panelType === 'Stats' ? 'border-2 border-[#2a323d]' : 'border border-transparent'}`}>
                                <div className="absolute top-3 left-3 z-40 opacity-0 group-hover:opacity-100 focus-within:opacity-100 transition-opacity duration-200">
                                    <Dropdown label={panelType} options={panelOptions} selected={panelType} onSelect={(newVal) => {
                                        if (newVal === 'Export CSV') handleExportCSV();
                                        else if (newVal === 'Import CSV') handleImportCSV();
                                        else { const p = [...panels]; p[index] = newVal; setPanels(p); }
                                    }} />
                                </div>
                                <div className="flex-1 relative overflow-hidden">{renderPanelContent(panelType, index)}</div>
                            </div>
                        ))}
                    </div>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
                            <div className="bg-[#12141c] w-full max-w-3xl rounded-xl border border-white/10 shadow-2xl flex flex-col max-h-[90vh]">
                                <div className="flex justify-between items-center p-6 border-b border-white/5">
                                    <div>
                                        <h2 className="text-2xl font-bold text-white mb-1">Customize Stats</h2>
                                        <p className="text-sm text-gray-400">Customize this here and now</p>
                                    </div>
                                    <button onClick={() => setIsModalOpen(false)} className="text-gray-400 hover:text-white p-2"><CloseIcon /></button>
                                </div>
                                <div className="p-6 overflow-y-auto">
                                    <div className="grid gap-2 h-64 w-full mb-6" style={{ gridTemplateColumns: 'repeat(2, minmax(0, 1fr))', gridTemplateRows: `repeat(${statsRowsNeeded}, minmax(0, 1fr))` }}>
                                        {statsConfig.map(block => (
                                            <div key={block.id} onClick={() => setSelectedBlockId(block.id)} className={`bg-white/[0.04] rounded-lg p-2.5 flex flex-col cursor-pointer overflow-hidden transition-all border-2 ${selectedBlockId === block.id ? 'border-primary shadow-[0_0_15px_rgba(36,107,253,0.3)]' : 'border-transparent hover:bg-white/10'}`} style={{ gridColumn: `span ${block.colSpan || 1}`, gridRow: `span ${block.rowSpan || 1}` }}>
                                                <span className="text-xs font-bold text-gray-400 leading-none mb-1">{block.label}</span>
                                                <div className={`w-full flex-1 flex items-center justify-center font-bold text-white leading-none ${block.rowSpan > 1 ? 'text-[48px]' : 'text-[26px]'}`}>{calcStatValue(block, solves)}</div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex justify-center gap-4 mb-8 border-b border-white/5 pb-8">
                                        <button onClick={() => { const newId = Math.max(0, ...statsConfig.map(b => b.id)) + 1; const nb = { id: newId, type: 'Average', result: 'Current', label: 'ao5', count: 5, colSpan: 1, rowSpan: 1 }; setStatsConfig([...statsConfig, nb]); setSelectedBlockId(newId); }} className="bg-primary hover:bg-blue-500 text-white text-sm font-semibold px-4 py-2 rounded-md glow-blue transition-all">Add block</button>
                                        <button onClick={() => { if (statsConfig.length <= 1) return; const nc = statsConfig.filter(b => b.id !== selectedBlockId); setStatsConfig(nc); setSelectedBlockId(nc[0].id); }} className="bg-red-500/10 hover:bg-red-500/20 text-red-400 text-sm font-semibold px-4 py-2 rounded-md transition-all">Remove selected</button>
                                    </div>
                                    {statsConfig.find(b => b.id === selectedBlockId) && (() => {
                                        const selectedBlock = statsConfig.find(b => b.id === selectedBlockId);
                                        const updateBlock = (updates) => {
                                            setStatsConfig(prev => prev.map(b => {
                                                if (b.id !== selectedBlockId) return b;
                                                const u = { ...b, ...updates };
                                                u.label = u.type === 'Single' ? (u.result === 'Best' ? 'pb' : 'worst') : `ao${u.count || '?'}` + (u.result === 'Best' ? ' pb' : '');
                                                return u;
                                            }));
                                        };
                                        return (
                                            <div className="space-y-6 max-w-md mx-auto">
                                                <h3 className="text-lg font-bold text-center mb-2">{selectedBlock.result} Solve</h3>
                                                <div>
                                                    <label className="text-sm font-semibold text-white/80 block mb-2">Stat type</label>
                                                    <div className="flex gap-2">
                                                        {['Single', 'Average'].map(type => (
                                                            <button key={type} onClick={() => updateBlock({ type, count: type === 'Average' ? 5 : null })} className={`px-4 py-2 rounded-md text-sm font-semibold transition-all ${selectedBlock.type === type ? 'bg-primary text-white glow-blue' : 'bg-white/5 text-gray-300 hover:bg-white/10'}`}>{type}</button>
                                                        ))}
                                                    </div>
                                                </div>
                                                <div>
                                                    <label className="text-sm font-semibold text-white/80 block mb-2">Stat result</label>
                                                    <div className="flex gap-2">
                                                        {['Best', 'Worst', 'Current'].map(result => {
                                                            if (selectedBlock.type === 'Single' && result === 'Current') return null;
                                                            if (selectedBlock.type === 'Average' && result === 'Worst') return null;
                                                            return <button key={result} onClick={() => updateBlock({ result })} className={`px-4 py-2 rounded-md text-sm font-semibold transition-all ${selectedBlock.result === result ? 'bg-primary text-white glow-blue' : 'bg-white/5 text-gray-300 hover:bg-white/10'}`}>{result}</button>;
                                                        })}
                                                    </div>
                                                </div>
                                                {selectedBlock.type === 'Average' && (
                                                    <div>
                                                        <label className="text-sm font-semibold text-white/80 block mb-2">Count</label>
                                                        <div className="flex gap-2">
                                                            {[5, 12, 50, 100].map(count => (
                                                                <button key={count} onClick={() => updateBlock({ count })} className={`px-4 py-2 rounded-md text-sm font-semibold transition-all ${selectedBlock.count === count ? 'bg-primary text-white glow-blue' : 'bg-white/5 text-gray-300 hover:bg-white/10'}`}>{count}</button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })()}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
